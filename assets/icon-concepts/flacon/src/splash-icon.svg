<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024"><g transform="translate(0 0) scale(1)">
  <defs>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B3A3A"/>
      <stop offset="1" stop-color="#5E2828"/>
    </linearGradient>
    <clipPath id="bodyClip"><rect x="353" y="387" width="318" height="410" rx="34"/></clipPath>
  </defs>
  <!-- cap -->
  <rect x="452" y="208" width="120" height="88" rx="18" fill="#EDE6DA"/>
  <!-- neck / sprayer collar -->
  <rect x="482" y="292" width="60" height="86" fill="#EDE6DA"/>
  <!-- liquid -->
  <rect x="353" y="566" width="318" height="231" fill="url(#liquid)" clip-path="url(#bodyClip)"/>
  <!-- body outline -->
  <rect x="342" y="376" width="340" height="432" rx="44" fill="none" stroke="#EDE6DA" stroke-width="22"/>
  <!-- glass highlight -->
  <line x1="398" y1="438" x2="398" y2="536" stroke="#EDE6DA" stroke-opacity="0.30" stroke-width="16" stroke-linecap="round"/></g></svg>